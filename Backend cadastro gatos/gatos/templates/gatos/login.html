<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login | Lar Bastet</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7efe5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: white;
      padding: 32px;
      border-radius: 16px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      color: #5b3924;
    }

    label {
      display: block;
      margin-top: 16px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      margin-top: 24px;
      padding: 12px;
      border: none;
      border-radius: 999px;
      background: #8b5e3c;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .error {
      background: #ffe1e1;
      color: #8a1f1f;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <h1>Lar Bastet</h1>
    <p>Acesso interno da responsável pelo projeto.</p>

    {% if form.errors %}
      <div class="error">
        Usuário ou senha inválidos.
      </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <label for="id_username">Usuário</label>
      {{ form.username }}

      <label for="id_password">Senha</label>
      {{ form.password }}

      <button type="submit">Entrar</button>
    </form>
  </main>
</body>
</html>
